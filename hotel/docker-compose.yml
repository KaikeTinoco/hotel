version: '3.8'

services:
  # Serviço do Banco de Dados
  postgres:
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d hotel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    image: postgres
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hotel_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # Sua API Spring Boot
  app:
    build: .
    container_name: hotel-api
    ports:
      - "8081:8080"
    depends_on:
       postgres:
          condition: service_healthy
    environment:
      # Aqui está o segredo: usar o nome do serviço 'postgres' em vez de 'localhost'
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hotel_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}